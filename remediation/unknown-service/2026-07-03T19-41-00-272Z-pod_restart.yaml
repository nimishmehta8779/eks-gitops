apiVersion: batch/v1
kind: Job
metadata:
  name: restart-unknown-pod
  namespace: default
  labels:
    remediation: "true"
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: dynatrace-workflow
      restartPolicy: Never
      containers:
      - name: kubectl
        image: bitnami/kubectl:latest
        command: ["kubectl", "delete", "pod", "unknown-pod", "-n", "default", "--grace-period=30"]
