apiVersion: batch/v1
kind: Job
metadata:
  name: restart-unknown
  namespace: aiops-remediation
  labels: { remediation-action: pod-restart, incident: dt- }
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: dynatrace-workflow
      restartPolicy: Never
      containers:
      - name: kubectl
        image: bitnami/kubectl:latest
        command: ["kubectl", "delete", "pod", "unknown", "-n", "default", "--grace-period=30"]
