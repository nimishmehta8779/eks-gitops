apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-remediation
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/nimishmehta8779/eks-gitops.git
    targetRevision: main
    path: remediation   # watches ALL remediation/<service>/ subdirs

  destination:
    server: https://kubernetes.default.svc
    namespace: aiops-remediation   # Jobs land here, they kubectl into target ns

  syncPolicy:
    automated:
      prune: true        # clean up completed Jobs automatically
      selfHeal: true
      allowEmpty: true   # ok when remediation dir is empty
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=background
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 1m
