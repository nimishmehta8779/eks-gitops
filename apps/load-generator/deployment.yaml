apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha-apps
  labels:
    app: team-alpha-apps

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: team-alpha-apps
  labels:
    app: load-generator
    scenario: cpu-saturation-test
    cluster: alpha-dev-general-3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      serviceAccountName: default
      containers:
      - name: load-gen
        image: progrium/busybox
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        command: ["/bin/sh"]
        args:
          - -c
          - |
            # Generate sustained CPU load to exceed 80 millicore threshold
            # This simulates a problematic application that Dynatrace will detect
            echo "Starting CPU load generation..."
            while true; do
              for i in $(seq 1 100000); do
                echo $((i * i)) > /dev/null
              done
              sleep 1
            done
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - echo "load-generator alive"
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - echo "ready"
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: load-generator
  namespace: team-alpha-apps
  labels:
    app: load-generator
spec:
  selector:
    app: load-generator
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
